<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yimday | Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Noto Sans Thai",
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(21, 94, 239, 0.18), transparent 42%),
          linear-gradient(180deg, #f3f7fb 0%, #edf4ff 100%);
        color: #0f172a;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
        padding: 28px;
      }

      .badge {
        width: 56px;
        height: 56px;
        border-radius: 20px;
        display: inline-grid;
        place-items: center;
        overflow: hidden;
        background: #ffffff;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
      }

      .badge img {
        width: 100%;
        height: 100%;
        display: block;
      }

      h1 {
        margin: 18px 0 0;
        font-size: 28px;
        line-height: 1.1;
      }

      p {
        margin: 12px 0 0;
        font-size: 14px;
        line-height: 1.7;
        color: #475569;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 16px;
        background: #155eef;
        color: #fff;
        padding: 12px 18px;
        font: inherit;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">
        <img src="/pwa/icon-192.png" alt="Yimday logo" />
      </div>
      <h1>คุณออฟไลน์อยู่</h1>
      <p>
        Yimday เปิดได้แบบติดตั้งเป็นแอป แต่ข้อมูลล่าสุดยังต้องใช้การเชื่อมต่ออินเทอร์เน็ต
        เมื่อกลับมาออนไลน์แล้วกดปุ่มด้านล่างเพื่อโหลดข้อมูลใหม่
      </p>
      <button type="button" onclick="window.location.reload()">ลองอีกครั้ง</button>
    </main>
  </body>
</html>
